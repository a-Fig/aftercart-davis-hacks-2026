# Cloud Build pipeline for AfterCart / ReceiptCheck.
#
# Build context = repo root. Dockerfile lives at web/Dockerfile (so the
# `web/` subdirectory + the .dockerignore at the root work together —
# .dockerignore excludes the OFF SQLite, which is mounted at runtime via
# Cloud Run's GCS FUSE volume from gs://aftercart-off-data).
#
# Trigger via:
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_TAG=v1
#
# Or shortened with default tag:
#   gcloud builds submit --config cloudbuild.yaml

substitutions:
  _TAG: v1
  _IMAGE: us-west1-docker.pkg.dev/aftercart-494521/aftercart/web

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - web/Dockerfile
      - -t
      - ${_IMAGE}:${_TAG}
      - -t
      - ${_IMAGE}:latest
      - .

images:
  - ${_IMAGE}:${_TAG}
  - ${_IMAGE}:latest
